<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>
<div class="contenedor">
    <div class="formulario">
        <h1>Editar Producto</h1>
        <form action="/actualizar_producto2" method="POST">
            <input type="hidden" name="clave" value="{{ producto.clave }}">

            <label>Nombre</label>
            <input type="text" name="nombre" value="{{ producto.nombre }}">

            <label>Stock</label>
            <input type="number" name="stock" value="{{ producto.stock }}">

            <label>Contenido</label>
            <input type="text" name="contenido" value="{{ producto.contenido }}">

            <label>Precio</label>
            <input type="number" step="0.01" name="precio" value="{{ producto.precio }}">

            <label>Proveedor</label>
            <select name="proveedor">
                {% for p in proveedores %}
                <option value="{{ p.id_proveedor }}" {% if p.id_proveedor == producto.id_proveedor %}selected{% endif %}>
                    {{ p.nombre }}
                </option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-editar">Guardar Cambios</button>
            <a href="/inventario2" class="btn-eliminar">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
