<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Inventario</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>
  <div class="contenedor">
    <div class="formulario">
      <h1>Crear cuenta - Inventario</h1>
      <form action="/guardar_usuario2" method="POST">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido_p" placeholder="Apellido Paterno" required>
        <input type="text" name="apellido_m" placeholder="Apellido Materno">
        <input type="tel" name="telefono" placeholder="Teléfono">
        <input type="email" name="correo" placeholder="Correo" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Confirmar registro</button>
      </form>
      <p>¿Ya tienes cuenta? <a href="/login2">Iniciar sesión</a></p>
    </div>
  </div>
</body>
</html>
